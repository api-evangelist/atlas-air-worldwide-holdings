aid: atlas-air-worldwide-holdings
name: Atlas Air Worldwide Holdings
description: >-
  Atlas Air Worldwide Holdings is a global airfreight, charter, and aircraft
  leasing group headquartered in Purchase, New York and operating across more
  than 80 countries and 330+ airports. The holding company positions itself as
  the "Leader in Aviation Outsourcing" and runs three operating businesses:
  Atlas Air (ACMI, CMI, charter, and military/government cargo and passenger
  operations on Boeing 747-400F, 747-8F, 777F, 767, and 737-800BCF freighters),
  Polar Air Cargo (scheduled airport-to-airport cargo network, historically a
  joint venture with DHL), and Titan Aviation Leasing (commercial aircraft
  acquisition, leasing, and sale-leaseback services). Atlas is the largest
  operator of the Boeing 747 freighter, the Dreamlifter operator for Boeing,
  and one of the principal lift providers for Amazon Air's middle-mile
  network. In August 2022 a consortium led by Apollo Global Management with
  J.F. Lehman & Company and Hill City Capital agreed to take the company
  private in an all-cash transaction valued at approximately US$5.2 billion;
  the deal closed in March 2023, delisting the company (formerly Nasdaq: AAWW).
  As a freight carrier the group does not publish a public developer portal or
  open APIs — integrations with shippers, forwarders, and customers are
  delivered through private B2B channels (EDI, Cargo-IMP/XML messaging,
  airwaybill tracking on polaraircargo.com, and account-managed connectivity).
  A "Track Shipment" tool and a Special Loads request form (specialloads.atlasair.com)
  are the principal self-service surfaces; an internal-facing GitHub
  organization (Atlas-Air-Data-Platform) exists but publishes no public repos.
